name: Java CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: mvn package
        
      - name: Run Spring Boot
        run: |
          java -jar target/*.jar &
          sleep 20
          
      - name: Health Check
        run: |
          curl http://localhost:8080/health          
