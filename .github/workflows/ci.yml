name: Java CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: mvn package
        
      - name: Show Manifest
        run: |
          unzip -p target/*.jar META-INF/MANIFEST.MF  
          
      - name: Check Target
        run: |
          ls -lh target
          
      - name: Build Docker Image
        run: |
          docker build -t hello-service:latest .
          
      - name: Show Images
        run: docker images

      - name: Run Docker Container
        run: |
          docker run -d \
            --name hello \
            -p 8080:8080 \
            hello-service:latest

      - name: Check Container
        run: |
          docker ps
    
      - name: Wait for Application
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8080/health; then
              echo "Application is ready!"
              exit 0
            fi
          
            echo "Waiting..."
            sleep 2
          done
          
          echo "Application failed to start"
          exit 1 

      - name: Dump Logs
        if: failure()
        run: |
          docker logs hello
        

