name: Sync Repository

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:

      #################################################################
      # Checkout Source Repository (A)
      #################################################################
      - name: Checkout Source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: source

      #################################################################
      # Checkout Target Repository (B)
      #################################################################
      - name: Checkout Target
        uses: actions/checkout@v7
        with:
          repository: GhostC-SQ/hello
          token: ${{ secrets.B_PAT }}
          path: target

      #################################################################
      # Sync Files
      #################################################################
      - name: Sync Files
        run: |

          shopt -s dotglob

          # 删除旧文件（保留 Git）
          find target -mindepth 1 \
            ! -path "target/.git*" \
            ! -path "target/.github*" \
            -exec rm -rf {} +

          # 拷贝所有源码
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            source/ target/

      #################################################################
      # Commit
      #################################################################
      - name: Commit Changes
        working-directory: target
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "sync from source repository"

      #################################################################
      # Push
      #################################################################
      - name: Push
        working-directory: target
        run: |

          git push origin HEAD:main
